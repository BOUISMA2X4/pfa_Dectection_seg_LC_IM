name: CI — Tests unitaires

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip               # met en cache ~/.cache/pip entre les runs

      # 3. Installer les dépendances
      #    torch CPU-only → beaucoup plus léger en CI (pas besoin de GPU pour les tests)
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      # 4. Créer un faux .env pour que config.py ne plante pas
      #    (les tests n'appellent pas Kaggle, mais load_dotenv() est importé)
      - name: Créer .env factice
        run: |
          echo "KAGGLE_USERNAME=ci_placeholder" >> .env
          echo "KAGGLE_KEY=ci_placeholder"      >> .env

      # 5. Lancer les tests
      - name: Lancer pytest
        run: pytest tests/test_datasets.py -v --tb=short

      # 6. (Optionnel) Publier un rapport XML lisible dans l'onglet Actions
      - name: Rapport de tests (JUnit XML)
        if: always()                          # même si les tests échouent
        run: pytest tests/test_datasets.py --junitxml=report.xml -q

      - name: Upload rapport XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: report.xml